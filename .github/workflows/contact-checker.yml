name: Telegram Contact Checker

on:
  schedule:
    - cron: "7 0,8,16 * * *" # offset 7 min past the hour - :00 is GitHub's most
    # congested minute (every cron job on the platform tends to land there),
    # which raises the odds of a scheduled run getting delayed or dropped.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # keeps a margin above MAX_RUNTIME_SECONDS (default 5h)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Checker
        env:
          CHECKER_API_ID: ${{ secrets.CHECKER_API_ID }}
          CHECKER_API_HASH: ${{ secrets.CHECKER_API_HASH }}
          CONTACT_CHECKER_SESSION: ${{ secrets.CONTACT_CHECKER_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ secrets.BATCH_SIZE }}
          CHECK_DELAY_SECONDS: ${{ secrets.CHECK_DELAY_SECONDS }}
          CHECKPOINT_INTERVAL: ${{ secrets.CHECKPOINT_INTERVAL }}
          MAX_RUNTIME_SECONDS: ${{ secrets.MAX_RUNTIME_SECONDS }}
          CANARY_PHONES: ${{ secrets.CANARY_PHONES }}
        run: python main.py --mode check
