name: Telegram Contact Checker

on:
  schedule:
    - cron: "7 0,6,12,18 * * *" # 4x/day, 6h apart = 5h run + 1h rest each cycle.
    # offset 7 min past the hour - :00 is GitHub's most congested minute.
  workflow_dispatch:

# Only one run of this workflow at a time, ever - manual or scheduled. If a
# second trigger arrives while one is running, it queues instead of starting
# a concurrent run with the same session (which risks Telegram revoking the
# session for being used from multiple IPs at once). Queued, not cancelled,
# so a manual run never loses its progress to a scheduled trigger showing up.
concurrency:
  group: telegram-checker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 330 # keeps a margin above MAX_RUNTIME_SECONDS (default 5h)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Checker
        env:
          CHECKER_API_ID: ${{ secrets.CHECKER_API_ID }}
          CHECKER_API_HASH: ${{ secrets.CHECKER_API_HASH }}
          CONTACT_CHECKER_SESSION: ${{ secrets.CONTACT_CHECKER_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BATCH_SIZE: ${{ secrets.BATCH_SIZE }}
          CHECK_DELAY_SECONDS: ${{ secrets.CHECK_DELAY_SECONDS }}
          CHUNK_DELAY_SECONDS: ${{ secrets.CHUNK_DELAY_SECONDS }}
          CHECKPOINT_INTERVAL: ${{ secrets.CHECKPOINT_INTERVAL }}
          MAX_RUNTIME_SECONDS: ${{ secrets.MAX_RUNTIME_SECONDS }}
          MIN_HITRATE_SAMPLE: ${{ secrets.MIN_HITRATE_SAMPLE }}
          MIN_HITRATE_PERCENT: ${{ secrets.MIN_HITRATE_PERCENT }}
        run: python main.py --mode check
