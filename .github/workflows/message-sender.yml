name: Telegram Message Sender

on:
  schedule:
    - cron: "30 * * * *" # Runs hourly at :30
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Sender
        env:
          SENDER_API_ID: ${{ secrets.SENDER_API_ID }}
          SENDER_API_HASH: ${{ secrets.SENDER_API_HASH }}
          MESSAGE_SENDER_SESSION: ${{ secrets.MESSAGE_SENDER_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MESSAGE_TEMPLATE: ${{ secrets.MESSAGE_TEMPLATE }}
          MESSAGE_BATCH_SIZE: ${{ secrets.MESSAGE_BATCH_SIZE }}
          MIN_ACTIVITY_LEVEL: ${{ secrets.MIN_ACTIVITY_LEVEL }}
        run: python main.py --mode send
