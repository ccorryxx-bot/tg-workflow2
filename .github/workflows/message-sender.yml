name: Telegram Message Sender

on:
  schedule:
    - cron: "*/30 * * * *" # Runs every 30 min - paired with MESSAGE_BATCH_SIZE=1
    # this sends one message per run instead of a multi-message burst once an
    # hour, which reads as more natural pacing for a newer sender account.
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Sender
        env:
          SENDER_API_ID: ${{ secrets.SENDER_API_ID }}
          SENDER_API_HASH: ${{ secrets.SENDER_API_HASH }}
          MESSAGE_SENDER_SESSION: ${{ secrets.MESSAGE_SENDER_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MESSAGE_TEMPLATE: ${{ secrets.MESSAGE_TEMPLATE }}
          MESSAGE_BATCH_SIZE: ${{ secrets.MESSAGE_BATCH_SIZE }}
          MIN_ACTIVITY_LEVEL: ${{ secrets.MIN_ACTIVITY_LEVEL }}
          MESSAGE_DELAY_MIN: ${{ secrets.MESSAGE_DELAY_MIN }}
          MESSAGE_DELAY_MAX: ${{ secrets.MESSAGE_DELAY_MAX }}
          FLOOD_SLEEP_THRESHOLD: ${{ secrets.FLOOD_SLEEP_THRESHOLD }}
        run: python main.py --mode send
