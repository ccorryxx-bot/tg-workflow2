name: Seed Database From Sheet

# Manual only - this is a one-time (or occasional) import, not a recurring job.
# Safe to re-run: numbers already in Supabase are skipped (ON CONFLICT phone).
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run Seed
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          PHONE_COLUMN_INDEX: ${{ secrets.PHONE_COLUMN_INDEX }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python main.py --mode seed
